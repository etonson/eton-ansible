---
- name: Update apt cache
  become: true
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install system packages
  become: true
  apt:
    name:
      - zsh
      - git
      - curl
      - wget
      - unzip
      - fonts-powerline
      - jq
      - libxml2-utils
      - build-essential
      - shellcheck
      - dos2unix
      - fontconfig
    state: present
  when: ansible_os_family == "Debian"

- name: Install Podman
  become: true
  apt:
    name: podman
    state: present
  when: ansible_os_family == "Debian" and install_podman | bool

- name: Check if Bun is installed
  command: which bun
  register: bun_check
  ignore_errors: true
  changed_when: false
  when: install_bun | bool

- name: Install Bun for the user
  shell: curl -fsSL https://bun.sh/install | bash
  args:
    creates: "{{ ansible_user_dir }}/.bun/bin/bun"
  when: install_bun | bool and bun_check.rc != 0

- name: Ensure .ssh directory exists
  file:
    path: "{{ ansible_user_dir }}/.ssh"
    state: directory
    mode: '0700'

- name: Ensure .ssh config include directory exists
  file:
    path: "{{ ansible_user_dir }}/.ssh/config.d"
    state: directory
    mode: '0700'

- name: Ensure .ssh company include directory exists
  file:
    path: "{{ ansible_user_dir }}/.ssh/company"
    state: directory
    mode: '0700'

- name: Ensure SSH config includes managed snippets
  lineinfile:
    path: "{{ ansible_user_dir }}/.ssh/config"
    line: "Include ~/.ssh/config.d/*.conf"
    insertbefore: BOF
    create: true
    mode: '0600'

- name: Ensure SSH config includes company snippets
  lineinfile:
    path: "{{ ansible_user_dir }}/.ssh/config"
    line: "Include ~/.ssh/company/*.conf"
    insertafter: "^Include ~/.ssh/config.d/\\*.conf$"
    create: true
    mode: '0600'

- name: Deploy project SSH config snippet
  template:
    src: ssh_config_eton_ansible.j2
    dest: "{{ ansible_user_dir }}/.ssh/config.d/eton-ansible.conf"
    mode: '0600'
